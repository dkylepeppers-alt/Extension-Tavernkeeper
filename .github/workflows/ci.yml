name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Protocol tests
        run: node tests/validate-protocol.mjs
      - name: Knowledge tests
        run: node tests/validate-knowledge.mjs
      - name: Settings + compat tests
        run: node tests/validate-settings.mjs
      - name: Managed extension writer tests
        run: |
          node tests/validate-writer.mjs
          node tests/validate-writer-routes.mjs
          node tests/validate-writer-client.mjs
          node tests/validate-writer-review.mjs
          node tests/validate-extension-tools.mjs
          node tests/validate-setup.mjs
      - name: Card + assets validation
        run: node tests/validate-card.mjs
